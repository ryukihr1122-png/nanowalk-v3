<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NanoWalk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #0D0D1A;
      color: #E0E0F0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .logo { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 32px; font-weight: 900; color: #00C9A7; margin-bottom: 8px; }
    .tagline { color: #9090AA; font-size: 15px; margin-bottom: 48px; text-align: center; }
    .links { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 320px; }
    a.link-btn {
      display: block;
      padding: 16px 24px;
      border-radius: 16px;
      background: #161628;
      border: 1px solid #1F1F38;
      color: #F0F0FF;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      transition: border-color 0.2s;
    }
    a.link-btn:hover { border-color: #00C9A7; color: #00C9A7; }
    footer { margin-top: 60px; color: #606080; font-size: 12px; text-align: center; }
  </style>
</head>

      <a href="mailto:ryuki.hr1122@icloud.com" style="color:#00C9A7;">ryuki.hr1122@icloud.com</a>
    </p>

</html>
